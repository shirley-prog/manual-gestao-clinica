  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

ottom:1px solid #2a4436;\">Pilar {{pillar.number}} — {{pillar.title}}<\u002Fa>\n      <\u002Fsc-for>\n      <a onclick=\"{{toggleNav}}\" href=\"#fases\" style=\"color:#dfe6df; font-family:'Lora',serif; font-size:14.5px; padding:9px 0; border-bottom:1px solid #2a4436;\">Fases de maturidade<\u002Fa>\n      <a onclick=\"{{toggleNav}}\" href=\"#resultado\" style=\"color:#dfe6df; font-family:'Lora',serif; font-size:14.5px; padding:9px 0; border-bottom:1px solid #2a4436;\">Resultado do diagnóstico<\u002Fa>\n      <a onclick=\"{{toggleNav}}\" href=\"#checklist\" style=\"color:#dfe6df; font-family:'Lora',serif; font-size:14.5px; padding:9px 0; border-bottom:1px solid #2a4436;\">Checklist geral<\u002Fa>\n      <a onclick=\"{{toggleNav}}\" href=\"#cta\" style=\"color:#f6f3ec; font-family:'Lora',serif; font-weight:600; font-size:14.5px; padding:9px 0;\">Agende seu diagnóstico →<\u002Fa>\n    <\u002Fnav>\n  <\u002Fdiv>\n\n  <!-- HERO -->\n  <div id=\"topo\" style=\"background:#152720; position:relative; overflow:hidden; padding:clamp(56px,10vw,120px) clamp(20px,6vw,40px) clamp(64px,8vw,96px) clamp(20px,6vw,40px); text-align:center;\">\n    <div style=\"position:absolute; top:-10%; right:-10%; font-family:'Lora',serif; font-weight:700; font-size:min(60vw,480px); line-height:1; color:#1f3a2c; user-select:none;\">10<\u002Fdiv>\n    <div style=\"position:relative; max-width:720px; margin:0 auto;\">\n      <div style=\"font-family:'Work Sans',sans-serif; font-size:12px; letter-spacing:0.2em; text-transform:uppercase; color:#c9707d; font-weight:600; margin-bottom:20px;\">Manual de gestão clínica<\u002Fdiv>\n      <h1 style=\"margin:0 0 20px 0; font-family:'Lora',serif; font-weight:600; font-size:clamp(30px,6vw,54px); line-height:1.12; color:#f6f3ec;\">Diagnóstico de Gestão Clínica<\u002Fh1>\n      <p style=\"margin:0 auto 36px auto; max-width:560px; font-family:'Lora',serif; font-style:italic; font-size:clamp(16px,2.4vw,20px); line-height:1.5; color:#cfd8cf;\">Os 10 pilares que determinam se uma clínica cresce de forma lucrativa ou apenas trabalha mais.<\u002Fp>\n      <div style=\"display:flex; gap:14px; justify-content:center; flex-wrap:wrap;\">\n        <a href=\"https://wa.me/5518998184929?text=Ol%C3%A1%2C%20quero%20agendar%20um%20diagn%C3%B3stico%20da%20minha%20cl%C3%ADnica\" target=\"_blank\" rel=\"noopener\" style=\"background:#1f3a2c; color:#f6f3ec; font-family:'Work Sans',sans-serif; font-weight:600; font-size:14px; padding:14px 26px; border-radius:999px;\">Falar no WhatsApp<\u002Fa>\n        <a href=\"https://calendar.google.com/calendar/u/0/appointments/schedules/AcZssZ3k3RsaOijcWYfmZ_KT4-sFrlk_xkW4RO4QrjwWZCG7Bv--XrIV4ySKvurI8n5wbHIY_YKnP9ap?gv=true\" target=\"_blank\" rel=\"noopener\" style=\"background:#9c3a45; color:#f6f3ec; font-family:'Work Sans',sans-serif; font-weight:600; font-size:14px; padding:14px 26px; border-radius:999px;\">Agendar diagnóstico<\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ANTES DE COMEÇAR -->\n  <div id=\"intro\" style=\"max-width:720px; margin:0 auto; padding:clamp(48px,8vw,88px) clamp(20px,6vw,24px);\">\n    <div style=\"width:44px; height:4px; background:#7a2333; margin-bottom:24px;\"><\u002Fdiv>\n    <h2 style=\"margin:0 0 28px 0; font-family:'Lora',serif; font-weight:600; font-size:clamp(26px,4vw,36px); color:#152720;\">Antes de começar<\u002Fh2>\n    <div style=\"font-family:'Lora',serif; font-size:16px; line-height:1.8; color:#28352c;\">\n      <p style=\"margin:0 0 16px 0;\">A maioria dos médicos acredita que o crescimento de uma clínica depende de atrair mais pacientes.<\u002Fp>\n      <p style=\"margin:0 0 16px 0;\">Mas a realidade é diferente.<\u002Fp>\n      <p style=\"margin:0 0 16px 0;\">Uma clínica pode ter agenda cheia, boa reputação, excelente capacidade técnica e, ainda assim, enfrentar dificuldades financeiras, excesso de trabalho, baixa previsibilidade e uma operação desorganizada.<\u002Fp>\n      <p style=\"margin:0 0 16px 0;\">Isso acontece porque o crescimento não depende apenas da qualidade técnica do profissional.<\u002Fp>\n      <p style=\"margin:0 0 16px 0; font-style:italic; color:#7a2333; font-weight:500;\">Ele depende da qualidade da gestão.<\u002Fp>\n      <p style=\"margin:0 0 16px 0;\">Assim como um paciente precisa de um diagnóstico antes de iniciar qualquer tratamento, uma clínica também precisa entender onde estão seus pontos fortes e, principalmente, seus gargalos.<\u002Fp>\n      <p style=\"margin:0 0 16px 0;\">Este material foi desenvolvido para ajudá-lo a fazer esse diagnóstico.<\u002Fp>\n      <p style=\"margin:0 0 16px 0;\">Ao longo das próximas seções você encontrará os principais pilares que sustentam uma clínica saudável, rentável e preparada para crescer.<\u002Fp>\n      <p style=\"margin:0 0 16px 0;\">O objetivo não é ensinar como implementar cada processo. O objetivo é ajudá-lo a identificar aquilo que já funciona, o que ainda precisa de atenção e quais fatores podem estar limitando o crescimento da sua operação.<\u002Fp>\n      <p style=\"margin:0 0 16px 0;\">Faça a leitura com honestidade.<\u002Fp>\n      <p style=\"margin:0; font-weight:500;\">Ao final, você terá uma visão muito mais clara da maturidade da gestão da sua clínica.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- 10 SINTOMAS -->\n  <div id=\"sintomas\" style=\"background:#efe9dc; padding:clamp(48px,8vw,88px) clamp(20px,6vw,24px);\">\n    <div style=\"max-width:960px; margin:0 auto;\">\n      <div style=\"width:44px; height:4px; background:#7a2333; margin-bottom:24px;\"><\u002Fdiv>\n      <h2 style=\"margin:0 0 14px 0; font-family:'Lora',serif; font-weight:600; font-size:clamp(24px,3.6vw,32px); color:#152720; max-width:600px; line-height:1.25;\">Os 10 sintomas de uma clínica que está crescendo da forma errada<\u002Fh2>\n      <p style=\"margin:0 0 36px 0; font-family:'Lora',serif; font-style:italic; font-size:16px; color:#7a2333; max-width:600px; line-height:1.5;\">Quantas destas situações fazem parte da sua rotina hoje? Se você se identificar com várias delas, este material foi feito para você.<\u002Fp>\n      <div style=\"display:grid; grid-template-columns:repeat(auto-fit,minmax(280px,1fr)); gap:24px;\">\n        <sc-for list=\"{{symptoms}}\" as=\"s\" hint-placeholder-count=\"10\">\n          <div style=\"background:#f6f3ec; padding:24px; border-top:3px solid #7a2333;\">\n            <div style=\"font-family:'Lora',serif; font-weight:700; font-size:22px; color:#c7bda5; margin-bottom:8px;\">{{s.number}}<\u002Fdiv>\n            <h3 style=\"margin:0 0 8px 0; font-family:'Lora',serif; font-weight:600; font-size:16px; color:#152720; line-height:1.4;\">{{s.title}}<\u002Fh3>\n            <p style=\"margin:0; font-size:13.5px; line-height:1.6; color:#4a544c;\">{{s.body}}<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n      <div style=\"margin-top:36px; padding:24px 28px; background:#152720;\">\n        <p style=\"margin:0 0 8px 0; font-family:'Lora',serif; font-size:15px; line-height:1.6; color:#dfe6df;\">Se você se identificou com três ou mais desses sintomas, existe uma grande chance de que alguns pilares importantes da sua gestão precisem de atenção.<\u002Fp>\n        <p style=\"margin:0; font-family:'Lora',serif; font-style:italic; font-size:15px; line-height:1.6; color:#f6f3ec;\">Nas próximas seções, você descobrirá exatamente onde estão essas oportunidades.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- PILARES -->\n  <sc-for list=\"{{pillars}}\" as=\"pillar\" hint-placeholder-count=\"10\">\n    <div id=\"pilar-{{pillar.number}}\" style=\"max-width:760px; margin:0 auto; padding:clamp(56px,8vw,96px) clamp(20px,6vw,24px); border-top:1px solid #ded4c0;\">\n      <div style=\"display:flex; align-items:baseline; gap:16px; margin-bottom:18px;\">\n        <span style=\"font-family:'Lora',serif; font-weight:700; font-size:clamp(40px,7vw,64px); color:#eadfe0; line-height:1;\">{{pillar.number}}<\u002Fspan>\n        <div>\n          <div style=\"font-family:'Work Sans',sans-serif; font-size:11px; letter-spacing:0.14em; text-transform:uppercase; color:#7a2333; font-weight:600; margin-bottom:6px;\">Pilar {{pillar.number}}<\u002Fdiv>\n          <h2 style=\"margin:0; font-family:'Lora',serif; font-weight:600; font-size:clamp(24px,4vw,34px); color:#152720;\">{{pillar.title}}<\u002Fh2>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <p style=\"margin:0 0 28px 0; font-family:'Lora',serif; font-style:italic; font-size:clamp(16px,2.4vw,19px); color:#7a2333; line-height:1.5;\">{{pillar.subtitle}}<\u002Fp>\n\n      <div style=\"font-family:'Lora',serif; font-size:15.5px; line-height:1.75; color:#28352c; margin-bottom:36px;\">\n        <sc-for list=\"{{pillar.intro}}\" as=\"para\" hint-placeholder-count=\"4\">\n          <p style=\"margin:0 0 14px 0;\">{{para}}<\u002Fp>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n\n      <div style=\"display:flex; flex-wrap:wrap; gap:0; margin-bottom:36px;\">\n        <div style=\"flex:1 1 300px; background:#152720; color:#f6f3ec; padding:28px 26px;\">\n          <h3 style=\"margin:0 0 18px 0; font-family:'Lora',serif; font-weight:600; font-size:17px; color:#f6f3ec;\">Quando este pilar está estruturado<\u002Fh3>\n          <sc-for list=\"{{pillar.structured}}\" as=\"item\" hint-placeholder-count=\"6\">\n            <div style=\"display:flex; gap:10px; margin-bottom:13px; font-size:13.5px; line-height:1.5; color:#dfe6df;\">\n              <span style=\"flex-shrink:0; color:#8fbf9f; font-weight:700;\">✔<\u002Fspan>\n              <span>{{item}}<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <div style=\"flex:1 1 300px; background:#eee6d8; padding:28px 26px;\">\n          <h3 style=\"margin:0 0 18px 0; font-family:'Lora',serif; font-weight:600; font-size:17px; color:#7a2333;\">Quando este pilar está fragilizado<\u002Fh3>\n          <sc-for list=\"{{pillar.fragile}}\" as=\"item\" hint-placeholder-count=\"6\">\n            <div style=\"display:flex; gap:10px; margin-bottom:13px; font-size:13.5px; line-height:1.5; color:#3a2e2e;\">\n              <span style=\"flex-shrink:0; color:#7a2333; font-weight:700;\">•<\u002Fspan>\n              <span>{{item}}<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <h3 style=\"margin:0 0 6px 0; font-family:'Lora',serif; font-weight:600; font-size:19px; color:#152720;\">O que observar<\u002Fh3>\n      <p style=\"margin:0 0 18px 0; font-family:'Work Sans',sans-serif; font-size:12.5px; color:#7a8a7c;\">Marque os itens que já fazem parte da sua rotina — eles contam para o seu score no final.<\u002Fp>\n      <div style=\"display:grid; grid-template-columns:repeat(auto-fit,minmax(260px,1fr)); gap:10px 28px; margin-bottom:28px;\">\n        <sc-for list=\"{{pillar.observeGroups}}\" as=\"group\" hint-placeholder-count=\"2\">\n          <sc-if value=\"{{group.label}}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"grid-column:1/-1; font-family:'Work Sans',sans-serif; font-size:11px; letter-spacing:0.1em; text-transform:uppercase; color:#7a2333; font-weight:600; margin-top:6px;\">{{group.label}}<\u002Fdiv>\n          <\u002Fsc-if>\n          <sc-for list=\"{{group.itemsObjs}}\" as=\"item\" hint-placeholder-count=\"4\">\n            <label style=\"display:flex; gap:10px; align-items:flex-start; cursor:pointer;\">\n              <input type=\"checkbox\" checked=\"{{item.checked}}\" onchange=\"{{item.onToggle}}\" style=\"margin-top:2px; width:16px; height:16px; accent-color:#7a2333; flex-shrink:0; cursor:pointer;\">\n              <span style=\"font-size:13.5px; line-height:1.5; color:#28352c;\">{{item.text}}<\u002Fspan>\n            <\u002Flabel>\n          <\u002Fsc-for>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n\n      <div style=\"background:#eee6d8; border-left:4px solid #7a2333; padding:20px 24px; margin-bottom:24px;\">\n        <div style=\"font-family:'Work Sans',sans-serif; font-size:11px; letter-spacing:0.12em; text-transform:uppercase; color:#7a2333; font-weight:600; margin-bottom:8px;\">Sinais de alerta<\u002Fdiv>\n        <p style=\"margin:0; font-family:'Lora',serif; font-size:14.5px; line-height:1.6; color:#28352c;\">{{pillar.alert}}<\u002Fp>\n      <\u002Fdiv>\n\n      <div style=\"background:#152720; padding:clamp(24px,4vw,36px); text-align:center;\">\n        <div style=\"font-family:'Work Sans',sans-serif; font-size:11px; letter-spacing:0.12em; text-transform:uppercase; color:#9c3a45; font-weight:600; margin-bottom:14px;\">Pergunta que todo gestor deveria conseguir responder<\u002Fdiv>\n        <p style=\"margin:0; font-family:'Lora',serif; font-style:italic; font-weight:500; font-size:clamp(17px,2.6vw,20px); line-height:1.5; color:#f6f3ec;\">{{pillar.question}}<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <sc-if value=\"{{pillar.reflectionAfter}}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"background:#152720; padding:clamp(56px,8vw,88px) clamp(20px,6vw,24px);\">\n        <div style=\"max-width:600px; margin:0 auto;\">\n          <div style=\"width:44px; height:4px; background:#9c3a45; margin-bottom:24px;\"><\u002Fdiv>\n          <h2 style=\"margin:0 0 24px 0; font-family:'Lora',serif; font-weight:600; font-size:clamp(24px,3.6vw,32px); color:#f6f3ec;\">Reflexão<\u002Fh2>\n          <div style=\"font-family:'Lora',serif; font-size:16px; line-height:1.8; color:#cfd8cf;\">\n            <sc-for list=\"{{pillar.reflectionAfter}}\" as=\"para\" hint-placeholder-count=\"4\">\n              <p style=\"margin:0 0 14px 0;\">{{para}}<\u002Fp>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n  <\u002Fsc-for>\n\n  <!-- FASES DE MATURIDADE -->\n  <div id=\"fases\" style=\"max-width:800px; margin:0 auto; padding:clamp(56px,8vw,96px) clamp(20px,6vw,24px);\">\n    <div style=\"width:44px; height:4px; background:#7a2333; margin-bottom:24px;\"><\u002Fdiv>\n    <h2 style=\"margin:0 0 14px 0; font-family:'Lora',serif; font-weight:600; font-size:clamp(26px,4vw,34px); color:#152720;\">As 5 fases de maturidade de uma clínica<\u002Fh2>\n    <p style=\"margin:0 0 40px 0; font-family:'Lora',serif; font-style:italic; font-size:16px; color:#7a2333; line-height:1.5;\">Toda clínica passa por diferentes fases de crescimento. O desafio é entender em qual delas você está hoje.<\u002Fp>\n    <sc-for list=\"{{phases}}\" as=\"phase\" hint-placeholder-count=\"5\">\n      <div style=\"display:flex; gap:24px; margin-bottom:36px; padding-bottom:32px; border-bottom:1px solid #ded4c0;\">\n        <div style=\"flex-shrink:0; font-family:'Lora',serif; font-weight:700; font-size:32px; color:#d8c9cb; width:44px;\">{{phase.number}}<\u002Fdiv>\n        <div style=\"flex:1; min-width:0;\">\n          <h3 style=\"margin:0 0 10px 0; font-family:'Lora',serif; font-weight:600; font-size:21px; color:#152720; text-transform:uppercase; letter-spacing:0.02em;\">{{phase.title}}<\u002Fh3>\n          <div style=\"font-family:'Lora',serif; font-size:14.5px; line-height:1.65; color:#28352c; margin-bottom:14px;\">\n            <sc-for list=\"{{phase.body}}\" as=\"para\" hint-placeholder-count=\"3\">\n              <p style=\"margin:0 0 8px 0;\">{{para}}<\u002Fp>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n          <div style=\"display:flex; flex-wrap:wrap; gap:8px 18px;\">\n            <sc-for list=\"{{phase.traits}}\" as=\"trait\" hint-placeholder-count=\"4\">\n              <span style=\"font-family:'Work Sans',sans-serif; font-size:12px; color:#7a2333; font-weight:600;\">— {{trait}}<\u002Fspan>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-for>\n    <div style=\"padding:28px 32px; background:#152720;\">\n      <div style=\"font-family:'Work Sans',sans-serif; font-size:11px; letter-spacing:0.12em; text-transform:uppercase; color:#c9707d; font-weight:600; margin-bottom:10px;\">Uma reflexão importante<\u002Fdiv>\n      <p style=\"margin:0 0 10px 0; font-family:'Lora',serif; font-size:15px; line-height:1.7; color:#dfe6df;\">Não existe problema em estar na Fase 1 ou na Fase 2. Toda clínica começa por elas.<\u002Fp>\n      <p style=\"margin:0 0 10px 0; font-family:'Lora',serif; font-size:15px; line-height:1.7; color:#dfe6df;\">O verdadeiro risco é permanecer nelas por anos, acreditando que mais pacientes, mais horas de trabalho ou mais investimento em marketing resolverão problemas que, na verdade, são de gestão.<\u002Fp>\n      <p style=\"margin:0; font-family:'Lora',serif; font-style:italic; font-size:15px; line-height:1.7; color:#f6f3ec;\">A boa notícia é que toda clínica pode evoluir. O primeiro passo é identificar, com clareza, onde ela está hoje.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- RAIO-X + RESULTADO -->\n  <div id=\"resultado\" style=\"background:#efe9dc; padding:clamp(56px,8vw,96px) clamp(20px,6vw,24px);\">\n    <div style=\"max-width:760px; margin:0 auto;\">\n      <div style=\"width:44px; height:4px; background:#7a2333; margin-bottom:24px;\"><\u002Fdiv>\n      <h2 style=\"margin:0 0 16px 0; font-family:'Lora',serif; font-weight:600; font-size:clamp(26px,4vw,34px); color:#152720;\">O Raio-X da sua clínica<\u002Fh2>\n      <p style=\"margin:0 0 44px 0; font-family:'Lora',serif; font-size:16px; line-height:1.8; color:#28352c;\">Enquanto você lia, você foi marcando os itens de \"O que observar\" em cada pilar. Este é o retrato completo — não é uma nota, é a maturidade da gestão da sua clínica hoje.<\u002Fp>\n\n      <div style=\"background:#152720; padding:clamp(32px,5vw,48px); text-align:center; margin-bottom:32px;\">\n        <div style=\"font-family:'Work Sans',sans-serif; font-size:11px; letter-spacing:0.14em; text-transform:uppercase; color:#c9707d; font-weight:600; margin-bottom:14px;\">Seu score de saúde do negócio<\u002Fdiv>\n        <div style=\"font-family:'Lora',serif; font-weight:700; font-size:clamp(56px,10vw,88px); line-height:1; color:#f6f3ec; margin-bottom:6px;\">{{score}}<\u002Fdiv>\n        <p style=\"margin:0 0 22px 0; font-family:'Work Sans',sans-serif; font-size:13px; color:#9fb0a1;\">{{checkedItems}} de {{totalItems}} pontos marcados<\u002Fp>\n        <div style=\"max-width:420px; margin:0 auto 18px auto; height:8px; background:#2a4436; border-radius:999px; overflow:hidden;\">\n          <div style=\"height:100%; width:{{scoreProgress}}%; background:#9c3a45; border-radius:999px;\"><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex; justify-content:space-between; max-width:420px; margin:0 auto 28px auto; font-family:'Work Sans',sans-serif; font-size:11px; color:#7a8a7c;\">\n          <span>10 — muito crítico<\u002Fspan>\n          <span>100 — expansão e consolidação<\u002Fspan>\n        <\u002Fdiv>\n        <h4 style=\"margin:0 0 10px 0; font-family:'Lora',serif; font-weight:600; font-size:22px; color:#f6f3ec;\">{{scoreTierName}}<\u002Fh4>\n        <div style=\"font-family:'Lora',serif; font-size:14.5px; line-height:1.7; color:#cfd8cf; max-width:520px; margin:0 auto; text-align:left;\">\n          <sc-for list=\"{{scoreTierBody}}\" as=\"para\" hint-placeholder-count=\"3\">\n            <p style=\"margin:0 0 8px 0;\">{{para}}<\u002Fp>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <h3 style=\"margin:0 0 24px 0; font-family:'Lora',serif; font-weight:600; font-size:22px; color:#152720;\">As faixas do diagnóstico<\u002Fh3>\n      <sc-for list=\"{{diagnosisTiers}}\" as=\"tier\" hint-placeholder-count=\"4\">\n        <div style=\"background:#f6f3ec; padding:28px 30px; margin-bottom:20px;\">\n          <div style=\"font-family:'Work Sans',sans-serif; font-size:11px; letter-spacing:0.12em; text-transform:uppercase; color:#7a2333; font-weight:600; margin-bottom:10px;\">{{tier.range}}<\u002Fdiv>\n          <h4 style=\"margin:0 0 12px 0; font-family:'Lora',serif; font-weight:600; font-size:20px; color:#152720;\">{{tier.name}}<\u002Fh4>\n          <div style=\"font-family:'Lora',serif; font-size:14.5px; line-height:1.7; color:#28352c;\">\n            <sc-for list=\"{{tier.body}}\" as=\"para\" hint-placeholder-count=\"4\">\n              <p style=\"margin:0 0 8px 0;\">{{para}}<\u002Fp>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- REFLEXÃO FINAL + OBJETIVO -->\n  <div style=\"background:#152720; padding:clamp(56px,8vw,96px) clamp(20px,6vw,24px);\">\n    <div style=\"max-width:600px; margin:0 auto 64px auto;\">\n      <div style=\"width:44px; height:4px; background:#9c3a45; margin-bottom:24px;\"><\u002Fdiv>\n      <h2 style=\"margin:0 0 24px 0; font-family:'Lora',serif; font-weight:600; font-size:clamp(24px,3.6vw,30px); color:#f6f3ec;\">Uma reflexão final<\u002Fh2>\n      <div style=\"font-family:'Lora',serif; font-size:15.5px; line-height:1.75; color:#cfd8cf;\">\n        <p style=\"margin:0 0 14px 0;\">Se você chegou até aqui, provavelmente percebeu uma coisa.<\u002Fp>\n        <p style=\"margin:0 0 14px 0;\">Os maiores desafios de uma clínica dificilmente estão concentrados em apenas uma área.<\u002Fp>\n        <p style=\"margin:0 0 4px 0;\">Não é apenas marketing.<\u002Fp>\n        <p style=\"margin:0 0 4px 0;\">Não é apenas financeiro.<\u002Fp>\n        <p style=\"margin:0 0 4px 0;\">Não é apenas equipe.<\u002Fp>\n        <p style=\"margin:0 0 14px 0;\">Não é apenas comercial.<\u002Fp>\n        <p style=\"margin:0 0 14px 0; font-weight:500; color:#f6f3ec;\">Todos os pilares estão conectados.<\u002Fp>\n        <p style=\"margin:0 0 4px 0;\">Uma equipe despreparada impacta a experiência do paciente.<\u002Fp>\n        <p style=\"margin:0 0 4px 0;\">Uma experiência ruim reduz as indicações.<\u002Fp>\n        <p style=\"margin:0 0 4px 0;\">Menos indicações aumentam a dependência do marketing.<\u002Fp>\n        <p style=\"margin:0 0 4px 0;\">Sem indicadores, os problemas passam despercebidos.<\u002Fp>\n        <p style=\"margin:0 0 4px 0;\">Sem processos, a operação perde eficiência.<\u002Fp>\n        <p style=\"margin:0 0 14px 0;\">Sem liderança, o crescimento se torna insustentável.<\u002Fp>\n        <p style=\"margin:0 0 4px 0;\">Gestão não é controlar pessoas.<\u002Fp>\n        <p style=\"margin:0; font-style:italic; color:#f6f3ec;\">Gestão é criar uma operação capaz de entregar resultados de forma consistente.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"max-width:640px; margin:0 auto; text-align:center;\">\n      <div style=\"font-family:'Work Sans',sans-serif; font-size:11px; letter-spacing:0.18em; text-transform:uppercase; color:#c9707d; font-weight:600; margin-bottom:24px;\">O verdadeiro objetivo<\u002Fdiv>\n      <p style=\"margin:0 0 20px 0; font-family:'Lora',serif; font-style:italic; font-weight:500; font-size:clamp(19px,3vw,25px); line-height:1.5; color:#f6f3ec;\">Uma clínica de alta performance não é aquela que possui a agenda mais cheia. É aquela que consegue crescer mantendo qualidade, lucratividade, previsibilidade e uma excelente experiência para seus pacientes.<\u002Fp>\n      <div style=\"width:44px; height:4px; background:#9c3a45; margin:28px auto;\"><\u002Fdiv>\n      <p style=\"margin:0 0 6px 0; font-family:'Lora',serif; font-size:17px; color:#cfd8cf;\">No final, não é a técnica que limita o crescimento de uma clínica.<\u002Fp>\n      <p style=\"margin:0; font-family:'Lora',serif; font-weight:600; font-size:19px; color:#f6f3ec;\">É a ausência de gestão.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- CHECKLIST GERAL -->\n  <div id=\"checklist\" style=\"max-width:960px; margin:0 auto; padding:clamp(56px,8vw,96px) clamp(20px,6vw,24px);\">\n    <div style=\"width:44px; height:4px; background:#7a2333; margin-bottom:24px;\"><\u002Fdiv>\n    <h2 style=\"margin:0 0 36px 0; font-family:'Lora',serif; font-weight:600; font-size:clamp(26px,4vw,34px); color:#152720;\">Checklist geral da clínica<\u002Fh2>\n    <div style=\"display:grid; grid-template-columns:repeat(auto-fit,minmax(240px,1fr)); gap:32px;\">\n      <sc-for list=\"{{checklist}}\" as=\"cat\" hint-placeholder-count=\"9\">\n        <div>\n          <h3 style=\"margin:0 0 14px 0; font-family:'Lora',serif; font-weight:600; font-size:17px; color:#7a2333;\">{{cat.label}}<\u002Fh3>\n          <sc-for list=\"{{cat.items}}\" as=\"item\" hint-placeholder-count=\"5\">\n            <div style=\"display:flex; gap:10px; margin-bottom:9px; font-size:13.5px; line-height:1.4; color:#28352c;\">\n              <span style=\"flex-shrink:0; color:#152720;\">□<\u002Fspan>\n              <span>{{item}}<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- CTA FINAL -->\n  <div id=\"cta\" style=\"background:#152720; padding:clamp(56px,8vw,96px) clamp(20px,6vw,24px);\">\n    <div style=\"max-width:640px; margin:0 auto 48px auto; text-align:center;\">\n      <div style=\"font-family:'Work Sans',sans-serif; font-size:11px; letter-spacing:0.18em; text-transform:uppercase; color:#c9707d; font-weight:600; margin-bottom:20px;\">Lembre-se<\u002Fdiv>\n      <p style=\"margin:0 0 18px 0; font-family:'Lora',serif; font-size:18px; line-height:1.6; color:#cfd8cf;\">Uma clínica cresce quando existe equilíbrio entre estratégia, gestão e execução. Se apenas um dos pilares estiver comprometido, toda a operação sente os impactos.<\u002Fp>\n      <p style=\"margin:0 0 24px 0; font-family:'Lora',serif; font-style:italic; font-weight:600; font-size:clamp(20px,3vw,26px); line-height:1.5; color:#f6f3ec;\">Qual desses pilares merece sua atenção primeiro?<\u002Fp>\n      <p style=\"margin:0; font-family:'Lora',serif; font-size:15px; color:#9fb0a1;\">Essa resposta pode definir o próximo nível de crescimento da sua clínica.<\u002Fp>\n    <\u002Fdiv>\n\n    <div style=\"max-width:640px; margin:0 auto; background:#1f3a2c; padding:clamp(28px,5vw,44px); text-align:center;\">\n      <h3 style=\"margin:0 0 12px 0; font-family:'Lora',serif; font-weight:600; font-size:clamp(20px,3vw,26px); color:#f6f3ec;\">Agende seu planejamento<\u002Fh3>\n      <p style=\"margin:0 0 28px 0; font-family:'Work Sans',sans-serif; font-size:14px; line-height:1.6; color:#cfd8cf;\">Converse com nossa equipe pelo WhatsApp ou escolha um horário direto na agenda abaixo.<\u002Fp>\n      <div style=\"display:flex; gap:14px; justify-content:center; flex-wrap:wrap;\">\n        <a href=\"https://wa.me/5518998184929?text=Ol%C3%A1%2C%20quero%20agendar%20um%20diagn%C3%B3stico%20da%20minha%20cl%C3%ADnica\" target=\"_blank\" rel=\"noopener\" style=\"background:#152720; color:#f6f3ec; font-family:'Work Sans',sans-serif; font-weight:600; font-size:14px; padding:14px 26px; border-radius:999px; border:1px solid #3a5748;\">Falar no WhatsApp<\u002Fa>\n        <a href=\"https://calendar.google.com/calendar/u/0/appointments/schedules/AcZssZ3k3RsaOijcWYfmZ_KT4-sFrlk_xkW4RO4QrjwWZCG7Bv--XrIV4ySKvurI8n5wbHIY_YKnP9ap?gv=true\" target=\"_blank\" rel=\"noopener\" style=\"background:#9c3a45; color:#f6f3ec; font-family:'Work Sans',sans-serif; font-weight:600; font-size:14px; padding:14px 26px; border-radius:999px;\">Ver horários disponíveis<\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- FLOATING SCHEDULING BAR -->\n  <div style=\"position:fixed; bottom:20px; right:20px; z-index:45; display:flex; flex-direction:column; gap:10px; align-items:flex-end;\">\n    <a href=\"https://calendar.google.com/calendar/u/0/appointments/schedules/AcZssZ3k3RsaOijcWYfmZ_KT4-sFrlk_xkW4RO4QrjwWZCG7Bv--XrIV4ySKvurI8n5wbHIY_YKnP9ap?gv=true\" target=\"_blank\" rel=\"noopener\" style=\"background:#9c3a45; color:#f6f3ec; font-family:'Work Sans',sans-serif; font-weight:600; font-size:13px; padding:13px 20px; border-radius:999px; box-shadow:0 6px 18px rgba(0,0,0,0.25); white-space:nowrap;\">Agendar diagnóstico<\u002Fa>\n    <a href=\"https://wa.me/5518998184929?text=Ol%C3%A1%2C%20quero%20agendar%20um%20diagn%C3%B3stico%20da%20minha%20cl%C3%ADnica\" target=\"_blank\" rel=\"noopener\" style=\"background:#152720; color:#f6f3ec; font-family:'Work Sans',sans-serif; font-weight:600; font-size:13px; padding:13px 20px; border-radius:999px; box-shadow:0 6px 18px rgba(0,0,0,0.25); white-space:nowrap; border:1px solid #3a5748;\">WhatsApp<\u002Fa>\n  <\u002Fdiv>\n\n  <!-- EXIT INTENT MODAL -->\n  <sc-if value=\"{{exitModalOpen}}\" hint-placeholder-val=\"{{ false }}\">\n    <div onclick=\"{{closeExitModal}}\" style=\"position:fixed; inset:0; background:rgba(10,18,14,0.65); z-index:70; display:flex; align-items:center; justify-content:center; padding:20px;\">\n      <div onclick=\"{{stopPropagation}}\" style=\"background:#f6f3ec; max-width:440px; width:100%; padding:clamp(28px,5vw,40px); position:relative;\">\n        <button onclick=\"{{closeExitModal}}\" aria-label=\"Fechar\" style=\"position:absolute; top:14px; right:14px; background:none; border:none; font-size:22px; color:#7a8a7c; cursor:pointer; line-height:1;\">×<\u002Fbutton>\n        <div style=\"font-family:'Work Sans',sans-serif; font-size:11px; letter-spacing:0.14em; text-transform:uppercase; color:#7a2333; font-weight:600; margin-bottom:14px;\">Antes de você ir<\u002Fdiv>\n        <h3 style=\"margin:0 0 12px 0; font-family:'Lora',serif; font-weight:600; font-size:24px; color:#152720; line-height:1.3;\">Quer conversar sobre o diagnóstico da sua clínica?<\u002Fh3>\n        <p style=\"margin:0 0 24px 0; font-family:'Work Sans',sans-serif; font-size:13.5px; line-height:1.6; color:#4a544c;\">Deixe seus dados que nossa equipe te chama no WhatsApp.<\u002Fp>\n        <div style=\"display:flex; flex-direction:column; gap:12px; margin-bottom:20px;\">\n          <input type=\"text\" placeholder=\"Seu nome\" value=\"{{leadName}}\" onchange=\"{{onLeadName}}\" style=\"font-family:'Work Sans',sans-serif; font-size:14px; padding:12px 14px; border:1px solid #ded4c0; background:#fff; color:#152720;\">\n          <input type=\"text\" placeholder=\"WhatsApp (com DDD)\" value=\"{{leadWhats}}\" onchange=\"{{onLeadWhats}}\" style=\"font-family:'Work Sans',sans-serif; font-size:14px; padding:12px 14px; border:1px solid #ded4c0; background:#fff; color:#152720;\">\n          <input type=\"text\" placeholder=\"CRM\" value=\"{{leadCrm}}\" onchange=\"{{onLeadCrm}}\" style=\"font-family:'Work Sans',sans-serif; font-size:14px; padding:12px 14px; border:1px solid #ded4c0; background:#fff; color:#152720;\">\n        <\u002Fdiv>\n        <button onclick=\"{{submitLead}}\" disabled=\"{{leadDisabled}}\" style=\"width:100%; background:#9c3a45; color:#f6f3ec; font-family:'Work Sans',sans-serif; font-weight:600; font-size:14px; padding:14px; border:none; border-radius:999px; cursor:pointer; opacity:{{leadButtonOpacity}};\">Quero ser contatado<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- FOOTER -->\n  <div style=\"background:#0f1e17; padding:clamp(28px,5vw,40px) clamp(20px,6vw,24px); text-align:center;\">\n    <div style=\"display:flex; gap:14px; justify-content:center; flex-wrap:wrap; margin-bottom:18px;\">\n      <a href=\"https://wa.me/5518998184929?text=Ol%C3%A1%2C%20quero%20agendar%20um%20diagn%C3%B3stico%20da%20minha%20cl%C3%ADnica\" target=\"_blank\" rel=\"noopener\" style=\"background:#1f3a2c; color:#f6f3ec; font-family:'Work Sans',sans-serif; font-weight:600; font-size:13px; padding:11px 22px; border-radius:999px;\">Falar no WhatsApp<\u002Fa>\n      <a href=\"https://calendar.google.com/calendar/u/0/appointments/schedules/AcZssZ3k3RsaOijcWYfmZ_KT4-sFrlk_xkW4RO4QrjwWZCG7Bv--XrIV4ySKvurI8n5wbHIY_YKnP9ap?gv=true\" target=\"_blank\" rel=\"noopener\" style=\"background:#9c3a45; color:#f6f3ec; font-family:'Work Sans',sans-serif; font-weight:600; font-size:13px; padding:11px 22px; border-radius:999px;\">Agendar diagnóstico<\u002Fa>\n    <\u002Fdiv>\n    <p style=\"margin:0; font-family:'Work Sans',sans-serif; font-size:12px; color:#7a8a7c;\">Manual de Gestão Clínica — Diagnóstico de Gestão Clínica<\u002Fp>\n  <\u002Fdiv>\n\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = { navOpen: false, checks: {}, exitModalOpen: false, leadName: \"\", leadWhats: \"\", leadCrm: \"\" };\n\n  componentDidMount() {\n    this._onMouseOut = (e) => {\n      if (e.clientY <= 0 && !sessionStorage.getItem('mgc_exit_shown') && !this.state.exitModalOpen) {\n        sessionStorage.setItem('mgc_exit_shown', '1');\n        this.setState({ exitModalOpen: true });\n      }\n    };\n    document.addEventListener('mouseout', this._onMouseOut);\n  }\n\n  componentWillUnmount() {\n    document.removeEventListener('mouseout', this._onMouseOut);\n  }\n\n  toggleCheck(id) {\n    this.setState(s => ({ checks: { ...s.checks, [id]: !s.checks[id] } }));\n  }\n\n  closeExitModal() {\n    this.setState({ exitModalOpen: false });\n  }\n\n  submitLead() {\n    const { leadName, leadWhats, leadCrm } = this.state;\n    const msg = 'Olá, meu nome é ' + (leadName || '—') + ', CRM ' + (leadCrm || '—') + ', WhatsApp ' + (leadWhats || '—') + '. Quero ser contatado sobre o diagnóstico de gestão clínica.';\n    const url = 'https://wa.me/5518998184929?text=' + encodeURIComponent(msg);\n    window.open(url, '_blank');\n    this.setState({ exitModalOpen: false });\n  }\n\n  renderVals() {\n    const symptoms = [\n      { number: \"01\", title: \"Agenda cheia, mas sensação constante de que o dinheiro nunca sobra.\", body: \"Faturar mais não significa lucrar mais. Muitas clínicas aumentam o volume de atendimentos sem aumentar a rentabilidade.\" },\n      { number: \"02\", title: \"Você sente que precisa resolver tudo pessoalmente.\", body: \"Sua equipe depende da sua aprovação para quase todas as decisões e a clínica desacelera sempre que você não está presente.\" },\n      { number: \"03\", title: \"Cada colaborador executa o trabalho de um jeito diferente.\", body: \"Quando não existem processos claros, a experiência do paciente muda conforme quem realiza o atendimento.\" },\n      { number: \"04\", title: \"O marketing gera movimento, mas não gera previsibilidade.\", body: \"Você publica conteúdo, investe em anúncios ou recebe muitos contatos, mas não consegue prever quantos novos pacientes realmente iniciam tratamento.\" },\n      { number: \"05\", title: \"Você não sabe exatamente onde está perdendo dinheiro.\", body: \"A clínica fatura, mas você não consegue identificar quais procedimentos são mais lucrativos ou quais decisões impactam diretamente o resultado financeiro.\" },\n      { number: \"06\", title: \"A equipe trabalha muito, mas os resultados não acompanham o esforço.\", body: \"Muito trabalho nem sempre significa alta performance. Sem direcionamento, produtividade e metas, esforço se transforma em desperdício.\" },\n      { number: \"07\", title: \"Os pacientes fazem um procedimento e desaparecem.\", body: \"A clínica precisa conquistar novos pacientes o tempo todo porque não possui uma estratégia consistente de fidelização.\" },\n      { number: \"08\", title: \"Você toma decisões pela sensação, e não pelos números.\", body: \"Sem indicadores, qualquer decisão importante passa a depender da percepção do gestor.\" },\n      { number: \"09\", title: \"Seu crescimento trouxe mais problemas do que tranquilidade.\", body: \"Quanto mais pacientes chegam, maior fica a sensação de desorganização. Isso normalmente indica que a estrutura não acompanhou o crescimento.\" },\n      { number: \"10\", title: \"Você trabalha cada vez mais, mas sente que a clínica depende exclusivamente de você.\", body: \"Este é, talvez, o principal sintoma de uma gestão que precisa evoluir. Empresas saudáveis crescem porque possuem estrutura, não porque o dono trabalha mais horas.\" }\n    ];\n\n    const reflection1 = [\n      \"A maioria das clínicas acredita que seus maiores problemas estão relacionados à captação de pacientes.\",\n      \"Na prática, muitos resultados deixam de acontecer porque liderança, pessoas e processos ainda não estão suficientemente estruturados.\",\n      \"Marketing acelera o crescimento.\",\n      \"Mas somente uma boa gestão consegue sustentá-lo.\"\n    ];\n\n    const reflection2 = [\n      \"Imagine duas clínicas. As duas possuem excelentes profissionais. As duas investem em tecnologia. As duas realizam os mesmos procedimentos.\",\n      \"Mas apenas uma delas possui controle financeiro, processo comercial estruturado e uma jornada cuidadosamente desenhada.\",\n      \"Qual delas terá maior previsibilidade de crescimento?\",\n      \"Na maioria das vezes, o diferencial não está na técnica. Está na gestão da operação.\"\n    ];\n\n    const reflection3 = [\n      \"Marketing atrai. Posicionamento diferencia. Produtos sustentam.\",\n      \"Quando esses três pilares trabalham de forma integrada, a clínica deixa de depender exclusivamente da aquisição constante de novos pacientes e passa a crescer com mais previsibilidade, maior valor percebido e melhor rentabilidade.\",\n      \"Clínicas que crescem de forma consistente não vendem apenas procedimentos. Elas constroem relacionamentos de longo prazo com seus pacientes.\"\n    ];\n\n    const pillars = [\n      {\n        number: \"01\", title: \"GESTÃO E LIDERANÇA\", subtitle: \"Toda clínica cresce até o limite da gestão do seu líder.\",\n        intro: [\n          \"O conhecimento técnico faz um excelente médico. A gestão constrói uma excelente empresa.\",\n          \"Quando o médico concentra todas as decisões, resolve todos os problemas, responde todas as dúvidas e precisa estar presente para tudo acontecer, a clínica deixa de ser uma empresa e passa a depender exclusivamente dele.\",\n          \"Isso limita o crescimento.\",\n          \"Liderar uma clínica significa criar direção, acompanhar resultados, desenvolver pessoas e garantir que a operação funcione mesmo quando você não está presente.\"\n        ],\n        structured: [\"O médico dedica mais tempo às decisões estratégicas.\", \"A equipe trabalha com autonomia.\", \"Os problemas diminuem porque existe clareza sobre responsabilidades.\", \"As decisões são tomadas com base em indicadores.\", \"Existe previsibilidade no crescimento da clínica.\", \"A empresa consegue crescer sem aumentar proporcionalmente a sobrecarga do gestor.\"],\n        fragile: [\"O médico resolve problemas o dia inteiro.\", \"A equipe depende constantemente da aprovação do gestor.\", \"As decisões acontecem de forma improvisada.\", \"Os resultados variam de um mês para outro.\", \"O crescimento gera mais estresse do que lucro.\", \"O gestor sente que nunca consegue sair da operação.\"],\n        observeGroups: [{ label: null, items: [\"Existe um planejamento anual da clínica?\", \"Existem metas claramente definidas?\", \"Os resultados são acompanhados mensalmente?\", \"A equipe conhece os objetivos da empresa?\", \"Existem reuniões periódicas de alinhamento?\", \"Cada líder conhece suas responsabilidades?\", \"As decisões são tomadas com base em dados?\", \"Existe acompanhamento dos principais indicadores?\"] }],\n        alert: \"Se você respondeu \\\"não\\\" para três ou mais perguntas acima, provavelmente sua clínica ainda depende muito mais da sua presença do que de uma gestão estruturada.\",\n        question: \"Se você precisasse se ausentar durante quinze dias, sua clínica continuaria funcionando com o mesmo padrão de qualidade?\",\n        reflectionAfter: null\n      },\n      {\n        number: \"02\", title: \"PESSOAS\", subtitle: \"Nenhuma clínica cresce além da capacidade da sua equipe.\",\n        intro: [\n          \"Uma equipe bem treinada não melhora apenas o atendimento.\",\n          \"Ela melhora a experiência do paciente, reduz erros, aumenta a produtividade, fortalece a imagem da clínica e permite que o médico concentre energia naquilo que realmente exige sua presença.\",\n          \"Investir em pessoas não significa apenas contratar. Significa desenvolver, acompanhar e criar uma cultura de excelência.\"\n        ],\n        structured: [\"Cada colaborador sabe exatamente qual é sua função.\", \"O atendimento acontece de forma padronizada.\", \"Existe senso de responsabilidade.\", \"O paciente percebe organização.\", \"O médico deixa de ser o centro de todas as decisões.\", \"O ambiente de trabalho torna-se mais produtivo.\"],\n        fragile: [\"Retrabalho frequente.\", \"Falta de alinhamento entre os setores.\", \"Conflitos internos.\", \"Rotatividade elevada.\", \"Dependência excessiva do gestor.\", \"Queda na qualidade da experiência do paciente.\"],\n        observeGroups: [{ label: null, items: [\"Existe um organograma definido?\", \"Cada colaborador possui responsabilidades claras?\", \"Há treinamento para novos colaboradores?\", \"Existe avaliação de desempenho?\", \"São realizados feedbacks periódicos?\", \"Existem metas individuais?\", \"Os colaboradores entendem a cultura da clínica?\", \"Existe plano de desenvolvimento da equipe?\"] }],\n        alert: \"Responder \\\"não\\\" para diversos itens demonstra que sua equipe pode estar trabalhando mais por tentativa e erro do que por direcionamento. Equipes sem clareza geram operações inconsistentes.\",\n        question: \"Cada colaborador da sua clínica sabe exatamente como contribui para os resultados da empresa?\",\n        reflectionAfter: null\n      },\n      {\n        number: \"03\", title: \"PROCESSOS\", subtitle: \"O crescimento sustentável depende de processos, não de memória.\",\n        intro: [\n          \"Quando cada colaborador executa uma atividade de uma maneira diferente, a qualidade deixa de ser previsível.\",\n          \"Processos existem para garantir que a experiência do paciente seja consistente, independentemente de quem esteja executando a tarefa.\",\n          \"Quanto maior a clínica, maior será a importância da padronização.\"\n        ],\n        structured: [\"A operação funciona de forma organizada.\", \"Os treinamentos são mais rápidos.\", \"Os erros diminuem.\", \"A experiência do paciente torna-se consistente.\", \"A clínica consegue crescer mantendo qualidade.\"],\n        fragile: [\"Cada pessoa trabalha de uma maneira.\", \"Informações importantes ficam concentradas em poucas pessoas.\", \"O retrabalho aumenta.\", \"Pequenos erros tornam-se recorrentes.\", \"O crescimento gera desorganização.\"],\n        observeGroups: [{ label: null, items: [\"Existe um fluxo definido para o atendimento?\", \"O processo de agendamento é padronizado?\", \"Existe confirmação automática ou organizada das consultas?\", \"Há um fluxo para pós-procedimento?\", \"Existem procedimentos operacionais documentados?\", \"O treinamento utiliza materiais padronizados?\", \"Existe um padrão para abertura e fechamento da clínica?\", \"Todos executam os processos da mesma forma?\"] }],\n        alert: \"Quando cada colaborador possui sua própria forma de trabalhar, a clínica perde eficiência, previsibilidade e qualidade.\",\n        question: \"Sua clínica funciona porque existem processos bem definidos ou porque determinadas pessoas \\\"sabem como fazer\\\"?\",\n        reflectionAfter: reflection1\n      },\n      {\n        number: \"04\", title: \"GESTÃO FINANCEIRA\", subtitle: \"Faturamento não é lucro.\",\n        intro: [\n          \"Um dos maiores erros na gestão de clínicas é acreditar que uma agenda cheia significa uma empresa saudável.\",\n          \"Uma clínica pode faturar muito e, ainda assim, apresentar baixa rentabilidade.\",\n          \"Gestão financeira não é apenas controlar entradas e saídas. É entender para onde o dinheiro está indo, quais procedimentos realmente geram lucro e quais decisões financeiras sustentam o crescimento da empresa.\",\n          \"Quem não acompanha números, administra no escuro.\"\n        ],\n        structured: [\"Existe previsibilidade financeira.\", \"As decisões são tomadas com segurança.\", \"A clínica conhece sua margem de lucro.\", \"O fluxo de caixa permanece saudável.\", \"Os investimentos acontecem com planejamento.\", \"O crescimento ocorre de forma sustentável.\"],\n        fragile: [\"O faturamento aumenta, mas o lucro não acompanha.\", \"O gestor não sabe exatamente quanto sobra no final do mês.\", \"Gastos crescem sem controle.\", \"A clínica trabalha constantemente sob pressão financeira.\", \"As decisões são tomadas por necessidade, e não por estratégia.\", \"Falta previsibilidade para novos investimentos.\"],\n        observeGroups: [{ label: null, items: [\"Existe fluxo de caixa atualizado?\", \"Você acompanha o lucro da clínica mensalmente?\", \"Conhece seus custos fixos e variáveis?\", \"Sabe qual é o ponto de equilíbrio da operação?\", \"Acompanha o ticket médio?\", \"Conhece a rentabilidade de cada procedimento?\", \"Existe orçamento financeiro anual?\", \"Os indicadores financeiros são revisados periodicamente?\"] }],\n        alert: \"Se você conhece seu faturamento, mas não sabe exatamente quanto lucra, sua gestão financeira precisa de atenção.\",\n        question: \"Hoje, quais procedimentos realmente sustentam o lucro da sua clínica?\",\n        reflectionAfter: null\n      },\n      {\n        number: \"05\", title: \"COMERCIAL\", subtitle: \"Toda clínica vende, mesmo quando acredita que não.\",\n        intro: [\n          \"O processo comercial começa muito antes da consulta.\",\n          \"Ele está presente no primeiro atendimento pelo WhatsApp, na forma como a equipe conduz a conversa, na experiência durante a avaliação e no acompanhamento realizado após o orçamento.\",\n          \"Quando não existe uma estratégia comercial estruturada, a clínica perde oportunidades diariamente sem perceber.\",\n          \"Não basta receber pacientes. É preciso transformar interesse em decisão.\"\n        ],\n        structured: [\"A equipe conduz o paciente com segurança.\", \"Existe acompanhamento dos orçamentos.\", \"A clínica reduz perdas de oportunidades.\", \"O paciente sente confiança durante todo o processo.\", \"O fechamento deixa de depender exclusivamente do médico.\", \"A conversão aumenta de forma consistente.\"],\n        fragile: [\"Muitos orçamentos ficam sem retorno.\", \"O follow-up acontece apenas quando sobra tempo.\", \"A equipe evita falar sobre investimento.\", \"O paciente sai da consulta sem direcionamento.\", \"A clínica perde oportunidades para a concorrência.\", \"As vendas tornam-se imprevisíveis.\"],\n        observeGroups: [{ label: null, items: [\"Você acompanha sua taxa de conversão?\", \"Existe um processo de follow-up?\", \"Todos os orçamentos recebem acompanhamento?\", \"A equipe comercial possui metas?\", \"Existe treinamento comercial?\", \"O tempo de resposta ao paciente é monitorado?\", \"A clínica acompanha cancelamentos e desistências?\", \"Existe um padrão para apresentação dos tratamentos?\"] }],\n        alert: \"Se você não sabe quantos pacientes deixam de fechar tratamento todos os meses, provavelmente está perdendo faturamento sem conseguir identificar onde.\",\n        question: \"Quantos pacientes interessados deixam de iniciar tratamento todos os meses na sua clínica?\",\n        reflectionAfter: null\n      },\n      {\n        number: \"06\", title: \"JORNADA DO PACIENTE\", subtitle: \"O paciente não avalia apenas o resultado clínico.\",\n        intro: [\n          \"Ele avalia toda a experiência.\",\n          \"Desde o primeiro contato até o pós-procedimento, cada interação influencia sua percepção sobre a clínica.\",\n          \"Uma excelente experiência aumenta a confiança, melhora a fidelização, fortalece as indicações e reduz a sensibilidade ao preço.\",\n          \"Pequenas falhas ao longo da jornada podem comprometer todo o tratamento.\"\n        ],\n        structured: [\"O paciente sente segurança em todas as etapas.\", \"O atendimento transmite profissionalismo.\", \"Existe maior fidelização.\", \"As indicações aumentam naturalmente.\", \"O paciente percebe valor além do procedimento.\", \"A experiência diferencia a clínica da concorrência.\"],\n        fragile: [\"Demora no atendimento.\", \"Falta de organização.\", \"Informações desencontradas.\", \"Longo tempo de espera.\", \"Pós-atendimento inexistente.\", \"Baixa fidelização.\", \"Poucas indicações espontâneas.\"],\n        observeGroups: [\n          { label: \"Primeiro contato\", items: [\"O paciente recebe resposta rápida?\", \"A comunicação transmite confiança?\", \"O atendimento segue um padrão?\"] },\n          { label: \"Agendamento\", items: [\"Existe confirmação organizada?\", \"O índice de faltas é acompanhado?\"] },\n          { label: \"Recepção\", items: [\"O ambiente transmite profissionalismo?\", \"O tempo de espera é monitorado?\"] },\n          { label: \"Consulta\", items: [\"O paciente compreende claramente sua proposta de tratamento?\", \"Existe acolhimento durante toda a experiência?\"] },\n          { label: \"Pós-procedimento\", items: [\"O paciente recebe acompanhamento?\", \"Existe pesquisa de satisfação?\", \"Há incentivo para retorno?\", \"Existe estratégia para fidelização?\"] }\n        ],\n        alert: \"Quando a clínica concentra todos os esforços apenas na consulta, perde oportunidades de encantar o paciente antes e depois do atendimento.\",\n        question: \"Em qual etapa da jornada sua clínica perde mais pacientes?\",\n        reflectionAfter: reflection2\n      },\n      {\n        number: \"07\", title: \"MARKETING\", subtitle: \"Marketing não serve para gerar curtidas. Serve para gerar crescimento.\",\n        intro: [\n          \"Muitas clínicas produzem conteúdo diariamente, investem em anúncios e publicam nas redes sociais com frequência.\",\n          \"Ainda assim, não conseguem transformar visibilidade em novos pacientes.\",\n          \"Isso acontece porque marketing não é sobre quantidade de publicações. É sobre estratégia.\",\n          \"Um bom marketing atrai o paciente certo, fortalece a autoridade da clínica e cria previsibilidade na aquisição de novos pacientes. Quando não existe estratégia, a clínica comunica muito e converte pouco.\"\n        ],\n        structured: [\"A comunicação transmite autoridade.\", \"Os pacientes chegam mais preparados para a consulta.\", \"O posicionamento torna a clínica mais desejada.\", \"Existe consistência na geração de oportunidades.\", \"O investimento em marketing passa a ser mensurável.\", \"A clínica reduz sua dependência de indicações.\"],\n        fragile: [\"O conteúdo é produzido sem planejamento.\", \"A clínica publica por obrigação.\", \"As redes sociais geram engajamento, mas poucos agendamentos.\", \"O investimento em anúncios não apresenta retorno claro.\", \"A comunicação muda constantemente.\", \"O mercado não percebe diferenciais na clínica.\"],\n        observeGroups: [{ label: null, items: [\"Existe um planejamento de marketing?\", \"A comunicação possui um posicionamento claro?\", \"Os resultados das campanhas são acompanhados?\", \"Existe produção de conteúdo estratégica?\", \"A clínica sabe quais canais geram mais pacientes?\", \"O investimento em marketing é analisado periodicamente?\", \"Existe integração entre marketing e equipe comercial?\", \"O paciente recebe a mesma mensagem em todos os canais de comunicação?\"] }],\n        alert: \"Se o marketing é medido apenas pela quantidade de seguidores ou curtidas, provavelmente a clínica está acompanhando métricas que pouco influenciam o crescimento do negócio.\",\n        question: \"Seu marketing está gerando pacientes qualificados ou apenas aumentando sua presença nas redes sociais?\",\n        reflectionAfter: null\n      },\n      {\n        number: \"08\", title: \"POSICIONAMENTO\", subtitle: \"Se o mercado não entende por que escolher sua clínica, ele escolherá pela comparação.\",\n        intro: [\n          \"Toda clínica possui concorrentes. Mas poucas conseguem ocupar um espaço claro na mente do paciente.\",\n          \"Posicionamento é a percepção que o mercado constrói sobre a sua clínica. É o motivo pelo qual um paciente escolhe você antes mesmo de comparar preços.\",\n          \"Quando esse pilar é negligenciado, a clínica entra em disputas por desconto, perde valor percebido e passa a competir apenas pelo procedimento.\"\n        ],\n        structured: [\"A clínica é facilmente lembrada.\", \"O paciente entende seus diferenciais.\", \"O valor percebido aumenta.\", \"O preço deixa de ser o principal fator de decisão.\", \"A autoridade cresce de forma consistente.\", \"A comunicação torna-se muito mais eficiente.\"],\n        fragile: [\"A clínica comunica exatamente o mesmo que os concorrentes.\", \"O paciente pergunta apenas sobre preço.\", \"Não existe diferenciação clara.\", \"O mercado enxerga a clínica como \\\"mais uma\\\".\", \"A concorrência influencia diretamente as decisões comerciais.\", \"A autoridade depende exclusivamente da imagem do médico.\"],\n        observeGroups: [{ label: null, items: [\"Sua clínica possui um posicionamento claramente definido?\", \"O paciente entende sua proposta de valor?\", \"Os diferenciais são comunicados com consistência?\", \"A comunicação é coerente em todos os canais?\", \"Existe um público prioritário?\", \"A identidade da clínica é reconhecida facilmente?\", \"O posicionamento orienta as decisões de marketing?\", \"A equipe comunica os mesmos diferenciais?\"] }],\n        alert: \"Quando qualquer clínica poderia utilizar exatamente a mesma comunicação que a sua, existe uma grande chance de o seu posicionamento ainda não estar claro.\",\n        question: \"Por que um paciente deveria escolher sua clínica em vez de qualquer outra da sua cidade?\",\n        reflectionAfter: null\n      },\n      {\n        number: \"09\", title: \"PORTFÓLIO DE PRODUTOS\", subtitle: \"Uma clínica saudável não depende de procedimentos isolados.\",\n        intro: [\n          \"O crescimento sustentável acontece quando existe uma estratégia clara de oferta.\",\n          \"Isso significa organizar tratamentos de forma que cada paciente encontre soluções adequadas ao seu momento, mantendo um relacionamento contínuo com a clínica.\",\n          \"Quando não existe essa organização, o faturamento torna-se instável e depende constantemente da entrada de novos pacientes.\"\n        ],\n        structured: [\"Existe previsibilidade de receita.\", \"Os pacientes permanecem por mais tempo.\", \"A recompra acontece naturalmente.\", \"O ticket médio aumenta.\", \"A clínica reduz sua dependência de novos pacientes.\", \"O crescimento torna-se mais consistente.\"],\n        fragile: [\"O faturamento oscila constantemente.\", \"A clínica depende apenas de campanhas promocionais.\", \"O paciente realiza um procedimento e não retorna.\", \"Existem poucas oportunidades de continuidade do tratamento.\", \"O ticket médio permanece baixo.\", \"Não há planejamento de recorrência.\"],\n        observeGroups: [{ label: null, items: [\"Existe uma estratégia de entrada para novos pacientes?\", \"A clínica possui tratamentos de continuidade?\", \"Existem protocolos estruturados?\", \"Os pacientes recebem recomendações de manutenção?\", \"Existe planejamento para aumento do ticket médio?\", \"O portfólio atende diferentes perfis de pacientes?\", \"Há estratégias de fidelização?\", \"A clínica acompanha a taxa de retorno dos pacientes?\"] }],\n        alert: \"Se a maior parte do faturamento depende exclusivamente de novos pacientes, sua operação pode estar vulnerável.\",\n        question: \"Sua clínica possui uma estratégia para aumentar o tempo de relacionamento com cada paciente?\",\n        reflectionAfter: reflection3\n      },\n      {\n        number: \"10\", title: \"INDICADORES\", subtitle: \"Você não consegue melhorar aquilo que não acompanha.\",\n        intro: [\n          \"Toda decisão importante dentro de uma clínica deve ser baseada em dados.\",\n          \"Quando os indicadores não são acompanhados, o gestor passa a administrar pela percepção, pela rotina ou pela intuição.\",\n          \"Embora a experiência seja importante, ela nunca substitui a clareza que os números proporcionam.\",\n          \"Os indicadores mostram onde a clínica está crescendo, onde está perdendo oportunidades e quais decisões precisam ser tomadas antes que pequenos problemas se transformem em grandes prejuízos.\"\n        ],\n        structured: [\"As decisões são rápidas e seguras.\", \"Os problemas são identificados antes de impactarem os resultados.\", \"Existe previsibilidade no crescimento.\", \"A equipe acompanha metas e desempenho.\", \"Os investimentos são feitos com mais segurança.\", \"A gestão torna-se muito mais estratégica.\"],\n        fragile: [\"Os problemas só são percebidos quando já causaram prejuízo.\", \"As decisões são tomadas com base em opiniões.\", \"A clínica não sabe exatamente onde perde dinheiro.\", \"Não existe previsibilidade de crescimento.\", \"O gestor trabalha constantemente \\\"apagando incêndios\\\".\"],\n        observeGroups: [{ label: null, items: [\"Número de novos pacientes por mês.\", \"Taxa de conversão.\", \"Ticket médio.\", \"Taxa de retorno.\", \"Taxa de recompra.\", \"Cancelamentos.\", \"No-show.\", \"Receita mensal.\", \"Lucro líquido.\", \"Margem de lucro.\", \"Lifetime Value (LTV).\", \"Custo de Aquisição de Pacientes (CAC).\", \"Índice de satisfação dos pacientes.\", \"Rentabilidade por procedimento.\"] }],\n        alert: \"Se você conhece apenas o faturamento da clínica, mas não acompanha os demais indicadores, provavelmente está deixando oportunidades importantes passarem despercebidas.\",\n        question: \"Quais são os cinco indicadores mais importantes da sua clínica neste momento?\",\n        reflectionAfter: null\n      }\n    ];\n\n    let totalItems = 0;\n    let checkedItems = 0;\n    pillars.forEach((p, pi) => {\n      p.observeGroups.forEach((g, gi) => {\n        g.itemsObjs = g.items.map((text, ii) => {\n          const id = 'p' + p.number + '-g' + gi + '-i' + ii;\n          totalItems += 1;\n          const checked = !!this.state.checks[id];\n          if (checked) checkedItems += 1;\n          return { id, text, checked, onToggle: () => this.toggleCheck(id) };\n        });\n      });\n    });\n\n    const score = Math.round(10 + (checkedItems / totalItems) * 90);\n    const scoreProgress = Math.round(((score - 10) / 90) * 100);\n    let scoreTierName = \"Clínica em Estado de Atenção\";\n    let scoreTierBody = [\n      \"Este diagnóstico indica que diversos pilares essenciais ainda não estão estruturados.\",\n      \"Isso não significa que sua clínica não tenha potencial.\",\n      \"Significa apenas que existem oportunidades importantes de organização antes de acelerar o crescimento.\"\n    ];\n    if (score >= 79) {\n      scoreTierName = \"Clínica em Expansão e Consolidação\";\n      scoreTierBody = [\n        \"Sua clínica demonstra uma base sólida de gestão.\",\n        \"Os principais pilares parecem estar organizados e existem fundamentos importantes para sustentar o crescimento.\",\n        \"O próximo desafio provavelmente será aumentar eficiência, rentabilidade e previsibilidade em busca de escala.\"\n      ];\n    } else if (score >= 56) {\n      scoreTierName = \"Clínica em Desenvolvimento\";\n      scoreTierBody = [\n        \"Sua clínica já apresenta diversos pilares importantes.\",\n        \"No entanto, algumas áreas ainda limitam o crescimento — é comum haver gargalos em pessoas, processos, indicadores ou estratégia comercial.\",\n        \"Antes de buscar crescer mais rápido, vale fortalecer a estrutura que sustentará esse crescimento.\"\n      ];\n    } else if (score >= 33) {\n      scoreTierName = \"Clínica Dependente da Operação\";\n      scoreTierBody = [\n        \"Sua empresa provavelmente depende muito do seu esforço diário, com grande parte dos resultados concentrada na figura do médico.\",\n        \"Isso costuma gerar sobrecarga, dificuldade para crescer e pouca previsibilidade financeira.\",\n        \"Fortalecer a gestão agora tende a produzir resultados muito mais relevantes do que investir em mais marketing.\"\n      ];\n    }\n\n    const phases = [\n      { number: \"01\", title: \"Sobrevivência\", body: [\"A clínica depende totalmente do médico.\", \"As decisões são tomadas no dia a dia. Existe pouco planejamento.\", \"O foco está apenas em manter a agenda cheia.\"], traits: [\"Centralização.\", \"Sobrecarga.\", \"Pouca previsibilidade.\", \"Baixa organização.\"] },\n      { number: \"02\", title: \"Organização\", body: [\"A clínica começa a estruturar processos e contratar equipe.\", \"Ainda existem muitos gargalos operacionais, mas o gestor percebe que precisa construir uma empresa, não apenas atender pacientes.\"], traits: [\"Início da padronização.\", \"Primeiros indicadores.\", \"Delegação limitada.\", \"Crescimento ainda instável.\"] },\n      { number: \"03\", title: \"Gestão\", body: [\"Os principais pilares passam a ser acompanhados.\", \"Existem metas, indicadores, reuniões e maior controle sobre a operação.\", \"As decisões deixam de ser reativas.\"], traits: [\"Gestão financeira.\", \"Processos definidos.\", \"Equipe mais preparada.\", \"Melhor experiência do paciente.\"] },\n      { number: \"04\", title: \"Escala\", body: [\"A clínica cresce sem perder qualidade.\", \"Os processos sustentam o aumento da demanda.\", \"O gestor atua cada vez mais de forma estratégica.\"], traits: [\"Operação organizada.\", \"Marketing previsível.\", \"Alta produtividade.\", \"Rentabilidade crescente.\"] },\n      { number: \"05\", title: \"Expansão\", body: [\"A clínica deixa de depender da presença constante do fundador.\", \"Existe uma cultura consolidada, liderança preparada e uma operação capaz de crescer de forma consistente.\"], traits: [\"Lideranças fortes.\", \"Indicadores maduros.\", \"Alta previsibilidade.\", \"Crescimento sustentável.\"] }\n    ];\n\n    const diagnosisTiers = [\n      { range: \"Score 10 – 32\", name: \"Clínica em Estado de Atenção\", body: [\"Este diagnóstico indica que diversos pilares essenciais ainda não estão estruturados.\", \"Isso não significa que sua clínica não tenha potencial.\", \"Significa apenas que existem oportunidades importantes de organização antes de acelerar o crescimento.\"] },\n      { range: \"Score 33 – 55\", name: \"Clínica Dependente da Operação\", body: [\"Sua empresa provavelmente depende muito do seu esforço diário, com grande parte dos resultados concentrada na figura do médico.\", \"Isso costuma gerar sobrecarga, dificuldade para crescer e pouca previsibilidade financeira.\", \"Fortalecer a gestão agora tende a produzir resultados muito mais relevantes do que investir em mais marketing.\"] },\n      { range: \"Score 56 – 78\", name: \"Clínica em Desenvolvimento\", body: [\"Sua clínica já apresenta diversos pilares importantes.\", \"No entanto, algumas áreas ainda limitam o crescimento — é comum haver gargalos em pessoas, processos, indicadores ou estratégia comercial.\", \"Antes de buscar crescer mais rápido, vale fortalecer a estrutura que sustentará esse crescimento.\"] },\n      { range: \"Score 79 – 100\", name: \"Clínica em Expansão e Consolidação\", body: [\"Sua clínica demonstra uma base sólida de gestão, com os principais pilares organizados.\", \"Existem fundamentos importantes para sustentar o crescimento.\", \"O próximo desafio provavelmente será aumentar eficiência, rentabilidade e previsibilidade em busca de escala.\"] }\n    ];\n\n    const checklist = [\n      { label: \"Gestão\", items: [\"Planejamento anual\", \"Metas definidas\", \"Reuniões de acompanhamento\", \"Indicadores de desempenho\", \"Orçamento financeiro\"] },\n      { label: \"Pessoas\", items: [\"Organograma\", \"Descrição de cargos\", \"Treinamentos\", \"Avaliações de desempenho\", \"Feedbacks periódicos\"] },\n      { label: \"Processos\", items: [\"Fluxos documentados\", \"Procedimentos padronizados\", \"Manual operacional\", \"Checklists internos\", \"Integração de novos colaboradores\"] },\n      { label: \"Financeiro\", items: [\"Fluxo de caixa\", \"Controle de custos\", \"Margem de lucro\", \"Ticket médio\", \"Rentabilidade por procedimento\"] },\n      { label: \"Comercial\", items: [\"Processo de vendas\", \"Follow-up\", \"Conversão monitorada\", \"Metas comerciais\", \"Tempo de resposta\"] },\n      { label: \"Jornada do Paciente\", items: [\"Experiência mapeada\", \"Confirmação de consultas\", \"Pós-procedimento\", \"Pesquisa de satisfação\", \"Estratégia de fidelização\"] },\n      { label: \"Marketing\", items: [\"Planejamento estratégico\", \"Posicionamento definido\", \"Produção de conteúdo\", \"Campanhas estruturadas\", \"Acompanhamento de resultados\"] },\n      { label: \"Produtos\", items: [\"Portfólio organizado\", \"Protocolos estruturados\", \"Estratégia de recorrência\", \"Aumento de ticket médio\", \"Plano de fidelização\"] },\n      { label: \"Indicadores\", items: [\"Novos pacientes\", \"Conversão\", \"Recompra\", \"CAC\", \"LTV\", \"Lucro\", \"No-show\", \"Cancelamentos\", \"Satisfação\"] }\n    ];\n\n    return {\n      symptoms,\n      pillars,\n      phases,\n      diagnosisTiers,\n      checklist,\n      navOpen: this.state.navOpen,\n      navDrawerTransform: this.state.navOpen ? 'translateX(0)' : 'translateX(-100%)',\n      toggleNav: () => this.setState(s => ({ navOpen: !s.navOpen })),\n      totalItems,\n      checkedItems,\n      score,\n      scoreProgress,\n      scoreTierName,\n      scoreTierBody,\n      exitModalOpen: this.state.exitModalOpen,\n      closeExitModal: () => this.closeExitModal(),\n      leadName: this.state.leadName,\n      leadWhats: this.state.leadWhats,\n      leadCrm: this.state.leadCrm,\n      onLeadName: (e) => this.setState({ leadName: e.target.value }),\n      onLeadWhats: (e) => this.setState({ leadWhats: e.target.value }),\n      onLeadCrm: (e) => this.setState({ leadCrm: e.target.value }),\n      submitLead: () => this.submitLead(),\n      leadValid: !!(this.state.leadName && this.state.leadWhats),\n      leadDisabled: !(this.state.leadName && this.state.leadWhats),\n      leadButtonOpacity: (this.state.leadName && this.state.leadWhats) ? 1 : 0.55,\n      stopPropagation: (e) => e.stopPropagation()\n    };\n  }\n}\n\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
